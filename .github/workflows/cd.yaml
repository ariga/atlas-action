name: Build and Upload to CDN
on:
  push:
    branches:
      - master
jobs:
  test:
    uses: ./.github/workflows/ci-go.yaml
    secrets: inherit
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      status: ${{ steps.create-release.outputs.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Git for GitHub bot
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
        shell: bash
      - name: Run Make Release
        id: create-release
        run: make release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
  build:
    needs: [release]
    if: ${{ needs.release.outputs.status == 'created' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GitHub Container Registry (${{ env.REGISTRY }})
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.RELEASE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.RELEASE_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Setup Go Environment
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version-file: go.mod
      - name: Install tfx-cli
        run: npm install -g tfx-cli
      - name: Install Atlas
        uses: ariga/setup-atlas@d1698c9cc991e6d65a02ce8bb9cd69fba6223cff # v0
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone version
      - name: Build assets
        run: make DOCKER_IMAGE=$DOCKER_IMAGE atlas-action test s3-upload docker azure-devops
        env:
          CGO_ENABLED: 0
          AWS_REGION: us-east-1
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          GH_TOKEN: ${{ github.token }}
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          RCLONE_S3_NO_CHECK_BUCKET: true
      - name: Upload Azure DevOps Extension
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: azure-devops-extension
          path: .github/azure-devops/ariga.atlas-action-*.vsix
  mirror-dockerhub:
    needs: [sync-gitlab, sync-orb, e2e-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      SOURCE_REGISTRY: ghcr.io
      SOURCE_IMAGE_NAME: ${{ github.repository }}
      TARGET_REGISTRY: docker.io
      TARGET_IMAGE_NAME: arigaio/atlas-action
      DOCKERHUB_USERNAME: arigaio
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Read image tags
        id: image-tags
        run: |
          version=$(cat VERSION.txt)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GitHub Container Registry (${{ env.SOURCE_REGISTRY }})
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.SOURCE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Login to Docker Hub (${{ env.TARGET_REGISTRY }})
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.TARGET_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Mirror image to Docker Hub
        run: |
          docker buildx imagetools create \
            --tag ${{ env.TARGET_REGISTRY }}/${{ env.TARGET_IMAGE_NAME }}:${{ steps.image-tags.outputs.version }} \
            --tag ${{ env.TARGET_REGISTRY }}/${{ env.TARGET_IMAGE_NAME }}:${{ steps.image-tags.outputs.major }} \
            ${{ env.SOURCE_REGISTRY }}/${{ env.SOURCE_IMAGE_NAME }}:${{ steps.image-tags.outputs.version }}
  sync-gitlab:
    needs: build
    uses: ./.github/workflows/cd-sync-gitlab.yaml
    secrets: inherit
  sync-orb:
    needs: build
    uses: ./.github/workflows/cd-sync-orb.yaml
    secrets: inherit
  # Run end-to-end test on the published binary.
  e2e-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ariga/setup-atlas@d1698c9cc991e6d65a02ce8bb9cd69fba6223cff # v0
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}
      - name: Run Migrate Lint
        env:
          GITHUB_TOKEN: ${{ github.token }}
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1
        with:
          uses: ariga/atlas-action/migrate/lint@v1
          with: '{
              "dir": "file://atlasaction/testdata/migrations",
              "dev-url": "sqlite://dev?mode=memory",
              "dir-name": "test-dir-sqlite"
            }'
      - name: Run Migrate Push
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1
        with:
          uses: ariga/atlas-action/migrate/push@v1
          with: '{
              "dir": "file://atlasaction/testdata/migrations",
              "dev-url": "sqlite://dev?mode=memory",
              "dir-name": "test-dir-sqlite"
            }'
