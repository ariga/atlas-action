name: Sync to GitLab

on:
  workflow_call:

jobs:
  sync:
    name: Sync Code to GitLab
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: make gitlab-manifest

      - env:
          SSH_PRIVATE_KEY: ${{ secrets.GITLAB_SYNC_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts

      - env:
          GITLAB_SSH_REPO: 'git@gitlab.com:arigaio/atlas.git'
          COMMIT_MSG: ${{ github.event.head_commit.message || format('Sync branch for {0}', github.actor) }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.name || github.actor }}
          AUTHOR_EMAIL: ${{ github.event.head_commit.author.email || 'actions@github.com' }}
        run: |
          git config --global user.name "$AUTHOR_NAME"
          git config --global user.email "$AUTHOR_EMAIL"

          git clone ${GITLAB_SSH_REPO} gitlab-repo

          mkdir -p gitlab-repo/templates
          rsync -av --delete gitlab/ gitlab-repo/templates/

          cd gitlab-repo
          git add templates/

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "$COMMIT_MSG"
            git push origin master
          else
            echo "No changes detected in the gitlab directory. Nothing to sync."
          fi

          # Tag and push according to VERSION.txt (full + major)
          VERSION=$(cat ../VERSION.txt | tr -d '[:space:]')
          [ -z "$VERSION" ] && { echo "VERSION.txt is empty"; exit 1; }
          case "$VERSION" in v*) ;; *) VERSION="v$VERSION"; esac
          MAJOR_VER="v$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)"

          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag "$VERSION"
            git push origin "$VERSION"
          else
            echo "Tag $VERSION already exists on GitLab."
          fi

          git tag -f "$MAJOR_VER"
          git push -f origin "$MAJOR_VER"