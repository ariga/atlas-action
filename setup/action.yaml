name: "Setup Atlas Action"
description: "Build and run the atlas-action"
inputs:
  token:
    description: "The GitHub token"
    default: ${{ github.server_url == 'https://github.com' && github.token || '' }}
    required: false
runs:
  using: "composite"
  steps:
    - id: envs
      run: |
        BIN_PATH=$HOME/atlas-action
        echo "cache-key=${{ runner.os }}-atlas-action-$ACTION_REF" >> "$GITHUB_OUTPUT"
        echo "path=$BIN_PATH" >> "$GITHUB_OUTPUT"
        echo "ATLAS_ACTION_LOCAL=1" >> "$GITHUB_ENV"
        echo "$BIN_PATH" >> "$GITHUB_PATH"
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
    - uses: actions/cache@v4
      id: cache
      with:
        key: ${{ steps.envs.outputs.cache-key }}
        path: ${{ steps.envs.outputs.path }}
    - if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/../go.mod
        cache: false
        token: ${{ inputs.token }}
    - if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      run: go install -ldflags "$LDFLAGS" ../cmd/atlas-action
      working-directory: ${{ github.action_path }}
      shell: bash
      env:
        GOBIN: ${{ steps.envs.outputs.path }}
        LDFLAGS: -s -w -X main.version=v0.0.0 -X main.commit=${{ github.action_ref }}
    - run: atlas-action --version
      shell: bash
